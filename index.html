<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVR – Wireframe-prototyp</title>
<style>
  :root{
    --bg:#FBF7F0; --ink:#1E1712; --muted:#6E6356; --line:#E0D7C8;
    --ph:#E6DFD4; --ph-line:#CFC4B2; --card:#fff; --accent:#2B5CE6;
    --ok:#4D7C0F; --draft:#B45309; --empty:#B0A696;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
  /* sidebar */
  aside{width:240px;flex:0 0 240px;border-right:1px solid var(--line);padding:24px 18px;position:sticky;top:0;height:100vh;overflow:auto}
  aside h1{font-size:15px;letter-spacing:.14em;margin:0 0 2px}
  aside .sub{font-size:11px;color:var(--muted);margin-bottom:22px}
  nav button{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:none;border:0;
    padding:9px 10px;border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer;margin-bottom:2px}
  nav button:hover{background:#F1EADF}
  nav button.active{background:var(--ink);color:#fff}
  nav button .n{font-size:10px;color:var(--muted)}
  nav button.active .n{color:#cdbfae}
  .legend{margin-top:24px;border-top:1px solid var(--line);padding-top:16px;font-size:11px;color:var(--muted);line-height:1.9}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
  /* main */
  main{flex:1;padding:36px 40px;max-width:880px;margin:0 auto}
  .pagehead{margin-bottom:8px}
  .pagehead h2{font-size:24px;margin:0 0 4px}
  .pagehead .meta{font-size:12px;color:var(--muted)}
  .canvas{margin-top:24px}
  /* section block */
  .sec{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:16px;overflow:hidden}
  .sec-top{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px dashed var(--line);font-size:11px;color:var(--muted)}
  .badge{background:#EEE7DB;border-radius:999px;padding:3px 10px;font-weight:600;color:var(--ink);letter-spacing:.04em}
  .sec-body{padding:20px}
  .sec h3{margin:0 0 6px;font-size:19px}
  .sec p{margin:0 0 8px;font-size:13.5px;color:#33291f;line-height:1.55}
  .sec .alt{font-size:12px;color:var(--muted);font-style:italic}
  .fields{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .field{font-size:11px;background:#F1EADF;border:1px dashed var(--ph-line);border-radius:6px;padding:4px 9px;color:var(--muted)}
  /* placeholders */
  .ph{background:repeating-linear-gradient(45deg,var(--ph),var(--ph) 10px,#ECE5DA 10px,#ECE5DA 20px);
    border:1px solid var(--ph-line);border-radius:8px;display:flex;align-items:center;justify-content:center;
    color:#8a7f6f;font-size:12px;text-align:center;padding:18px;margin-top:12px;min-height:90px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .cards.two{grid-template-columns:repeat(2,1fr)}
  .mini{border:1px solid var(--line);border-radius:10px;padding:14px;background:#FCFAF6}
  .mini .ico{width:34px;height:34px;border-radius:8px;background:var(--ph);border:1px solid var(--ph-line);margin-bottom:10px}
  .mini h4{margin:0 0 6px;font-size:14px}
  .mini p{font-size:12px;color:var(--muted);margin:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{background:#EEF1FB;color:#22315f;border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600}
  .ctaband{background:var(--ink);color:#fff;border-radius:12px;padding:30px;text-align:center;margin-top:12px}
  .ctaband h3{color:#fff;font-size:20px}
  .btn{display:inline-block;background:var(--accent);color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;margin-top:6px}
  .btn.ghost{background:transparent;border:1px solid #cdbfae;color:#cdbfae;margin-left:8px}
  /* 80/20 bar */
  .split{display:flex;height:54px;border-radius:10px;overflow:hidden;margin-top:14px;border:1px solid var(--ph-line)}
  .split .ai{flex:0 0 80%;background:#DCE3FA;display:flex;align-items:center;justify-content:center;font-size:12.5px;color:#22315f;font-weight:600}
  .split .you{flex:1;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600}
  .status-pill{margin-left:auto;display:flex;align-items:center;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
  @media(max-width:720px){aside{display:none}main{padding:24px 18px}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside>
  <h1>SEVR INSIGHTS</h1>
  <div class="sub">Wireframe-prototyp · v0</div>
  <nav id="nav"></nav>
  <div class="legend">
    <div><span class="dot" style="background:var(--ok)"></span>klar</div>
    <div><span class="dot" style="background:var(--draft)"></span>utkast</div>
    <div><span class="dot" style="background:var(--empty)"></span>tom</div>
    <div style="margin-top:10px">🖼 bild · 📊 dataviz · 🎬 video · ✦ illustration</div>
  </div>
</aside>
<main>
  <div class="pagehead" id="pagehead"></div>
  <div class="canvas" id="canvas"></div>
</main>

<script>
const C={ok:"var(--ok)",draft:"var(--draft)",empty:"var(--empty)"};
// helpers to build section body html
const ph = (t)=>`<div class="ph">${t}</div>`;
const fields = (arr)=>`<div class="fields">${arr.map(f=>`<span class="field">${f}</span>`).join("")}</div>`;

const pages = {
 vision:{title:"Vision", route:"/vision", aud:"alla · manifest/story",
  secs:[
   {t:"Hero",s:"draft",b:`<h3>Redovisningsekonomen – entreprenörens bästa vän.</h3>
     <p class="alt">Alt: Vi tar tråket. Du tar omdömet. · Mer tid till det du faktiskt är utbildad för.</p>
     <p>SEVR finns för att lyfta redovisningsekonomen. Vi låter AI sköta det tråkiga – så att du lägger din tid och ditt omdöme där det gör skillnad: hos kunden.</p>
     <a class="btn">Boka demo</a><a class="btn ghost">Se hur det fungerar →</a>
     ${ph("🖼 Hero-bild: ekonom i arbete / produktskärm")}`},
   {t:"Textblock",s:"draft",b:`<h3>Det här tror vi på</h3>
     <p>Redovisningsekonomen ser sanningen i siffrorna, vet när något är på väg åt fel håll och kan få pengarna att räcka längre.</p>
     <p>Ändå går dagen åt till annat: tanka data, hämta rapporter, validera, stänga böcker. Tid som aldrig når kunden. <b>Det vill vi ändra på.</b></p>
     ${ph("✦ Illustration: en arbetsdag — mest grovjobb, lite kund")}`},
   {t:"Textblock",s:"draft",b:`<h3>Vår vision</h3>
     <p>Att göra redovisningsekonomen till entreprenörens bästa vän. Vi sänker pucken i högsäsong och jämnar ut arbetet över året – din vardag blir mer förutsägbar och din rådgivning mer värd.</p>`},
   {t:"Textblock + Stats",s:"draft",b:`<h3>Människa och maskin</h3>
     <p>AI gör ungefär 80 % av jobbet: hämtar, bearbetar, validerar och förbereder leveransen. De sista 20 % gör du – omdömet går inte att automatisera.</p>
     <div class="split"><div class="ai">AI 80% – hämtar, bearbetar, validerar</div><div class="you">Du 20% – omdömet</div></div>
     <p class="alt" style="margin-top:10px">Human in the loop, hela vägen. AI som arbetar för dig.</p>`},
   {t:"Feature / Pelare",s:"draft",b:`<h3>Hur vi gör det</h3>
     <div class="cards">
       <div class="mini"><div class="ico"></div><h4>Rapportering som skalar</h4><p>Period, månad, kvartal, bokslut – till många, inte en i taget.</p></div>
       <div class="mini"><div class="ico"></div><h4>Regelverk du kan lita på</h4><p>Svar direkt, med exakt källa, kopplat till kundens data.</p></div>
       <div class="mini"><div class="ico"></div><h4>Agenter i kärnprocesser</h4><p>Avstämningar, konteringar, bokslut. Fler kunder, inte fler timmar.</p></div>
     </div>${ph("🖼 ×3 skärmbild/illustration per pelare")}`},
   {t:"Textblock",s:"draft",b:`<h3>Varför det spelar roll</h3>
     <p>När det tråkiga försvinner får du tillbaka tiden. Och tid gör att du kan sälja mer, hjälpa bättre, höja kvaliteten och få bättre marginal på kunderna du redan har.</p>
     <div class="chips"><span class="chip">Sälj mer</span><span class="chip">Hjälp bättre</span><span class="chip">Högre kvalitet</span><span class="chip">Bättre marginal</span></div>`},
   {t:"CTA-band",s:"draft",b:`<div class="ctaband"><h3>AI gör 80 %. Ditt omdöme gör resten.</h3>
     <p style="color:#cdbfae">Vi bygger SEVR för att lyfta dig som ekonom – inte ersätta dig.</p><a class="btn">Boka demo</a></div>`},
  ]},
 start:{title:"Startsida", route:"/", aud:"alla · hubb",
  secs:[
   {t:"Hero",s:"empty",b:fields(["Eyebrow","Rubrik","Underrubrik","Primär CTA","Sekundär CTA","Visuellt"])+ph("🖼 Hero-visual")},
   {t:"Trygghetsrad",s:"empty",b:fields(["Punkt 1","Punkt 2","Punkt 3"])},
   {t:"Logotyper",s:"empty",b:ph("🖼 4–8 logotyper")},
   {t:"Spårval",s:"empty",b:`<div class="cards two"><div class="mini"><h4>För byråer →</h4><p>en mening</p></div><div class="mini"><h4>För företag →</h4><p>en mening</p></div></div>`},
   {t:"Feature / Pelare",s:"empty",b:`<div class="cards"><div class="mini"><div class="ico"></div><h4>Rapportering</h4><p>…</p></div><div class="mini"><div class="ico"></div><h4>Regelverk</h4><p>…</p></div><div class="mini"><div class="ico"></div><h4>Agenter</h4><p>…</p></div></div>`},
   {t:"Så fungerar",s:"empty",b:fields(["Steg 1","Steg 2","Steg 3","Steg 4"])},
   {t:"Bevis / Stats",s:"empty",b:fields(["Siffra 1","Siffra 2","Siffra 3"])},
   {t:"Omdömen",s:"empty",b:ph("🖼 1–3 omdömen (citat/namn/roll/byrå)")},
   {t:"FAQ",s:"empty",b:fields(["5–8 frågor"])},
   {t:"CTA-band",s:"empty",b:`<div class="ctaband"><h3>Rubrik</h3><a class="btn">Boka demo</a></div>`},
  ]},
 byra:{title:"För byråer", route:"/for-byraer", aud:"byrå",
  secs:[
   {t:"Hero",s:"empty",b:fields(["Eyebrow","Rubrik","Underrubrik","CTA","Visuellt"])+ph("🖼 Hero-visual")},
   {t:"Problem",s:"empty",b:fields(["Rubrik","Inledning","Smärta 1","Smärta 2","Smärta 3"])},
   {t:"Lösning",s:"empty",b:fields(["Rubrik","Beskrivning","Resultatpunkter"])},
   {t:"Feature / Pelare",s:"empty",b:`<div class="cards"><div class="mini"><div class="ico"></div><h4>…</h4></div><div class="mini"><div class="ico"></div><h4>…</h4></div><div class="mini"><div class="ico"></div><h4>…</h4></div></div>`},
   {t:"Så fungerar",s:"empty",b:fields(["Steg 1–4"])},
   {t:"Värde / Stats",s:"empty",b:fields(["Siffra 1","Siffra 2","Siffra 3"])},
   {t:"Omdömen",s:"empty",b:ph("🖼 1–3 omdömen")},
   {t:"Pris",s:"empty",b:fields(["19 kr/kund","Credit-paket","CTA"])},
   {t:"FAQ",s:"empty",b:fields(["5–8 frågor"])},
   {t:"CTA-band",s:"empty",b:`<div class="ctaband"><h3>Rubrik</h3><a class="btn">Boka demo</a></div>`},
  ]},
 foretag:{title:"För företag", route:"/for-foretag", aud:"företag/VD · senare",
  secs:[
   {t:"Hero",s:"empty",b:fields(["Rubrik","Underrubrik","CTA","Visuellt"])+ph("🖼 Hero-visual")},
   {t:"Problem",s:"empty",b:fields(["Smärta 1–3"])},
   {t:"Lösning",s:"empty",b:fields(["Digital CFO"])},
   {t:"Feature / Pelare",s:"empty",b:`<div class="cards"><div class="mini"><div class="ico"></div><h4>…</h4></div><div class="mini"><div class="ico"></div><h4>…</h4></div><div class="mini"><div class="ico"></div><h4>…</h4></div></div>`},
   {t:"Värde / Stats",s:"empty",b:fields(["Siffra 1–3"])},
   {t:"Omdömen",s:"empty",b:ph("🖼 1–3 omdömen")},
   {t:"Pris",s:"empty",b:fields(["från 799 kr/mån","CTA"])},
   {t:"FAQ",s:"empty",b:fields(["5–8 frågor"])},
   {t:"CTA-band",s:"empty",b:`<div class="ctaband"><h3>Rubrik</h3><a class="btn">Boka demo</a></div>`},
  ]},
 pris:{title:"Pris", route:"/pris", aud:"alla",
  secs:[
   {t:"Hero",s:"empty",b:fields(["Rubrik","Underrubrik"])},
   {t:"Pris – byrå",s:"empty",b:fields(["19 kr/kund","Credit-paket","CTA"])},
   {t:"Pris – företag",s:"empty",b:fields(["från 799 kr/mån","CTA"])},
   {t:"FAQ",s:"empty",b:fields(["Pris/credits/avtal"])},
   {t:"CTA-band",s:"empty",b:`<div class="ctaband"><h3>Rubrik</h3><a class="btn">Boka demo</a></div>`},
  ]},
 demo:{title:"Boka demo", route:"/demo", aud:"alla · konvertering",
  secs:[
   {t:"Hero",s:"empty",b:fields(["Rubrik","Underrubrik"])},
   {t:"Formulär",s:"empty",b:fields(["Namn","E-post","Företag/byrå","Antal kunder","Meddelande","Knapptext"])+ph("Formulär")},
   {t:"Trygghetsrad",s:"empty",b:fields(["3 punkter"])},
   {t:"FAQ",s:"empty",b:fields(["3–4 frågor"])},
  ]},
};

const order=["start","byra","foretag","pris","demo","vision"];
const nav=document.getElementById("nav");
order.forEach((k,i)=>{
  const p=pages[k];const b=document.createElement("button");
  b.innerHTML=`<span>${p.title}</span><span class="n">${i+1}</span>`;
  b.onclick=()=>render(k,b);nav.appendChild(b);
});

function render(key,btn){
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
  if(btn)btn.classList.add("active");
  const p=pages[key];
  document.getElementById("pagehead").innerHTML=
    `<h2>${p.title}</h2><div class="meta">${p.route} · ${p.aud} · ${p.secs.length} sektioner</div>`;
  document.getElementById("canvas").innerHTML=p.secs.map((s,i)=>{
    const col=C[s.s];
    return `<div class="sec"><div class="sec-top">
        <span class="badge">${s.t}</span>
        <span>sektion ${i+1}</span>
        <span class="status-pill"><span class="dot" style="background:${col}"></span>${s.s==='ok'?'klar':s.s==='draft'?'utkast':'tom'}</span>
      </div><div class="sec-body">${s.b}</div></div>`;
  }).join("");
  window.scrollTo(0,0);
}
render("vision", nav.children[order.indexOf("vision")]);
</script>
</body>
</html>
